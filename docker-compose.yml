services:
  scrinium:
    build:
      context: .
      dockerfile: src/Scrinia.Server/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - scrinium-data:/data
    environment:
      - Scrinia__DataDir=/data
      # Uncomment to enable Vulkan GPU-accelerated embeddings (requires GPU passthrough)
      # - Scrinia__Embeddings__Vulkan=true
    restart: unless-stopped

volumes:
  scrinium-data:
